# Mindstrate — standalone deployment compose
# ------------------------------------------------------------
# Designed to coexist with other docker services on the same host.
# - Custom bridge network `mindstrate-net` is fully isolated from the
#   default `bridge` network, so it does NOT see or interfere with your
#   existing containers (e.g. the Feishu bot service).
# - Project name is fixed to `mindstrate` via `name:` so you can manage
#   it with `docker compose -f deploy/docker-compose.deploy.yml ...`
#   from anywhere, without the compose project colliding with others.
# - Host ports are configurable in .env.deploy. Defaults are 3388 / 3377.
# - All persistent data lives in the named volume `mindstrate-data`,
#   shared read-write by team-server (writer) and web-ui (reader+writer).
#
# Quick start (server, after you cloned the repo):
#   cp deploy/.env.deploy.example deploy/.env.deploy
#   # edit deploy/.env.deploy: set TEAM_API_KEY, optionally change ports
#   docker compose -f deploy/docker-compose.deploy.yml --env-file deploy/.env.deploy up -d --build
#
# Verify:
#   curl http://127.0.0.1:${TEAM_PORT:-3388}/health
#   open http://<server-ip>:${WEB_UI_PORT:-3377}
#
# Stop / upgrade / remove (does NOT touch any other docker project):
#   docker compose -f deploy/docker-compose.deploy.yml --env-file deploy/.env.deploy down
#   docker compose -f deploy/docker-compose.deploy.yml --env-file deploy/.env.deploy pull   # if using a registry
#   docker compose -f deploy/docker-compose.deploy.yml --env-file deploy/.env.deploy up -d --build

name: mindstrate

services:
  team-server:
    build:
      context: ..
      dockerfile: deploy/team-server.Dockerfile
    image: mindstrate/team-server:latest
    container_name: mindstrate-team-server
    restart: unless-stopped
    networks: [mindstrate-net]
    ports:
      # bind to 127.0.0.1 by default for safety; flip to 0.0.0.0 in
      # .env.deploy if you want the server reachable on the LAN.
      - "${TEAM_BIND:-0.0.0.0}:${TEAM_PORT:-3388}:3388"
    environment:
      TEAM_PORT: "3388"
      TEAM_API_KEY: "${TEAM_API_KEY:?TEAM_API_KEY must be set in .env.deploy}"
      MINDSTRATE_DATA_DIR: "/data"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      # LLM provider config moved to the Web UI (Settings → LLM Configs).
      # Per-project keys/models live in SQLite, not env vars.
    volumes:
      - mindstrate-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3388/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M

  web-ui:
    build:
      context: ..
      dockerfile: deploy/web-ui.Dockerfile
    image: mindstrate/web-ui:latest
    container_name: mindstrate-web-ui
    restart: unless-stopped
    networks: [mindstrate-net]
    ports:
      - "${WEB_UI_BIND:-0.0.0.0}:${WEB_UI_PORT:-3377}:3377"
    environment:
      PORT: "3377"
      HOSTNAME: "0.0.0.0"
      TEAM_API_KEY: "${TEAM_API_KEY:?TEAM_API_KEY must be set in .env.deploy}"
      MINDSTRATE_DATA_DIR: "/data"
      MINDSTRATE_LOCALE: "${WEB_UI_LOCALE:-zh}"
      # Web UI shares the same database as team-server; do NOT point it
      # at the team-server HTTP API. Direct DB access is intentional.
    volumes:
      - mindstrate-data:/data
    depends_on:
      team-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3377/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 768M

  # ----------------------------------------------------------------
  # Optional: repo-scanner daemon
  # ----------------------------------------------------------------
  # Polls configured Git/P4 sources on a schedule and pushes commits
  # into the Team Server as context events. Talks to team-server over
  # the internal docker network (TEAM_SERVER_URL=http://team-server:3388).
  #
  # Enable with:
  #   docker compose -f deploy/docker-compose.deploy.yml \
  #     --env-file deploy/.env.deploy --profile scanner up -d --build
  #
  # Configure sources from the admin Web UI:
  #   http://<host>:${WEB_UI_PORT:-3377}/admin/scanner-sources
  # Each source carries its own connection details (Git remote URL + token,
  # or P4 host/user/password), so one scanner container can serve many
  # projects backed by different servers and accounts. The shared
  # mindstrate-data volume below is what lets the scanner read those rows.
  repo-scanner:
    build:
      context: ..
      dockerfile: deploy/repo-scanner.Dockerfile
      args:
        # Set to 1 to bake in the Perforce CLI. Adds ~50 MB.
        INSTALL_P4: "${INSTALL_P4:-0}"
    image: mindstrate/repo-scanner:latest
    container_name: mindstrate-repo-scanner
    restart: unless-stopped
    profiles: [scanner]
    networks: [mindstrate-net]
    # Run as root so bind-mounted P4 workspaces owned by the host root
    # user stay readable and the graph extraction cache
    # (<workspace>/.mindstrate/) stays writable. Drop this and chown the
    # workspace's .mindstrate dir to 1001 if you prefer the non-root user.
    user: "0:0"
    environment:
      TEAM_SERVER_URL: "http://team-server:3388"
      TEAM_API_KEY: "${TEAM_API_KEY:?TEAM_API_KEY must be set in .env.deploy}"
      MINDSTRATE_DATA_DIR: "/data"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      # First-run indexing of a large checkout builds the whole project graph
      # in memory: the deduped node/edge set has to stay resident for the
      # second-pass binding inference, so heap scales with graph size (a ~40k
      # file / ~170k node checkout needs well over 1.5 GB). Give Node a real
      # heap and cap per-file reads so a few huge blobs can't OOM the index.
      # Bump both this and SCANNER_MEMORY_LIMIT in .env.deploy for very large
      # monorepos — if the heap is exceeded the process is hard-killed mid-run
      # and the scan is recovered as "orphaned" on the next start.
      NODE_OPTIONS: "${SCANNER_NODE_OPTIONS:---max-old-space-size=4096}"
      MINDSTRATE_SCAN_MAX_FILE_BYTES: "${SCANNER_MAX_FILE_BYTES:-2097152}"
    volumes:
      - mindstrate-data:/data
      - mindstrate-scanner-repos:/repos
      # P4 workspaces synced on the host, exposed to the scanner under
      # /workspaces/<name>. Mount OUTSIDE the container's /root (it is
      # mode 700) and set each scanner source's repoPath to the
      # container-side path, e.g. /workspaces/ms_nami_dev.
      - /root/ms_nami_dev:/workspaces/ms_nami_dev
    depends_on:
      team-server:
        condition: service_healthy
    deploy:
      resources:
        limits:
          # Must exceed --max-old-space-size above (heap) plus native/V8
          # overhead, or the kernel OOM-kills the container before Node's own
          # heap limit triggers.
          memory: "${SCANNER_MEMORY_LIMIT:-6g}"

volumes:
  mindstrate-data:
    name: mindstrate-data
  mindstrate-scanner-repos:
    name: mindstrate-scanner-repos

networks:
  mindstrate-net:
    name: mindstrate-net
    driver: bridge
